{% extends "base.html" %}

{% block title %}
Chỉnh sửa hoa - Lạc Hà
{% endblock %}

{% block css %}
<link rel="stylesheet" href="{{ request.url_for('static', path='css/add_flower.css') }}">
{% endblock %}

{% block content %}

<div class="form-container">

    <div class="form-title">
        ✍️ Chỉnh sửa hoa
    </div>

    <form id="flowerForm" enctype="multipart/form-data">

        <!-- NAME -->
        <div class="mb-3">
            <label class="form-label">Tên hoa</label>

            <input type="text"
                   name="name"
                   class="form-control modern-input"
                   value="{{ flower.name }}"
                   required>
        </div>

        <!-- IMAGE -->
        <div class="mb-3">
            <label class="form-label">Hình ảnh</label>

            <input type="file"
                   name="image"
                   id="imageInput"
                   class="form-control modern-input"
                   accept="image/*">

            <div class="preview-wrapper mt-3">
                <img id="previewImg"
                     src="{{ flower.img }}"
                     class="show"
                     alt="preview">

                <div id="previewText" style="display:none;">
                    Chưa chọn ảnh mới
                </div>
            </div>
        </div>

        <!-- RANK -->
        <div class="mb-3">
            <label class="form-label">Phẩm chất</label>

            <div class="rank-grid mt-2">

                {% for i in range(1,6) %}
                <input type="radio"
                       id="r{{ i }}"
                       name="rank"
                       value="{{ i }}"
                       {% if flower.rank == i %}checked{% endif %}>

                <label for="r{{ i }}" class="rank-item r{{ i }}"></label>
                {% endfor %}

            </div>
        </div>

        <div id="msgBox" class="alert d-none"></div>

        <button type="submit" id="submitBtn" class="btn-submit">
             Cập nhật
        </button>

        <div id="loading" class="mt-3 d-none">
             Đang cập nhật...
        </div>

    </form>

</div>

{% endblock %}

{% block js %}

<script>

const input = document.getElementById("imageInput");
const previewImg = document.getElementById("previewImg");

const form = document.getElementById("flowerForm");
const msgBox = document.getElementById("msgBox");
const loading = document.getElementById("loading");
const btn = document.getElementById("submitBtn");


// IMAGE PREVIEW
input.addEventListener("change", function () {

    const file = this.files[0];

    if (file) {
        const reader = new FileReader();

        reader.onload = function (e) {
            previewImg.src = e.target.result;
        };

        reader.readAsDataURL(file);
    }
});


// SUBMIT UPDATE
form.addEventListener("submit", async function (e) {

    e.preventDefault();

    msgBox.classList.add("d-none");
    loading.classList.remove("d-none");
    btn.disabled = true;

    const formData = new FormData(form);

    try {

        const response = await fetch(
            "/flowers/{{ flower.id }}",
            {
                method: "PUT",
                body: formData
            }
        );

        const data = await response.json();

        loading.classList.add("d-none");
        btn.disabled = false;

        if (data.success) {

            msgBox.className = "alert alert-success";
            msgBox.innerText = data.message;
            msgBox.classList.remove("d-none");

            setTimeout(() => {
                window.location.href = "/flowers/";
            }, 1000);

        } else {

            msgBox.className = "alert alert-danger";
            msgBox.innerText = data.message;
            msgBox.classList.remove("d-none");
        }

    } catch (err) {

        loading.classList.add("d-none");
        btn.disabled = false;

        msgBox.className = "alert alert-danger";
        msgBox.innerText = "Không thể kết nối server";
        msgBox.classList.remove("d-none");
    }

});

</script>

{% endblock %}
